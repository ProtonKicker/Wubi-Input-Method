<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新世纪五笔字根图 (06版)</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configure Tailwind to respect system dark mode -->
  <script>
    tailwind.config = {
      darkMode: 'media',
    }
  </script>

  <!-- Load React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel to understand JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  
  <!-- React Code starts here -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // New Century (新世纪/06版) Wubi Mnemonics Data
    const wubiData = {
      Q: { zone: 35, letter: 'Q', keyName: '金', mnemonic: '金夕犭儿包头鱼' },
      W: { zone: 34, letter: 'W', keyName: '人', mnemonic: '人八登祭风头几' },
      E: { zone: 33, letter: 'E', keyName: '月', mnemonic: '月舟衣力豕豸臼' },
      R: { zone: 32, letter: 'R', keyName: '白', mnemonic: '白斤气头叉手提' },
      T: { zone: 31, letter: 'T', keyName: '禾', mnemonic: '禾竹牛旁卧人立' },
      Y: { zone: 41, letter: 'Y', keyName: '言', mnemonic: '言文方点在四一' },
      U: { zone: 42, letter: 'U', keyName: '立', mnemonic: '立带两点病门里' },
      I: { zone: 43, letter: 'I', keyName: '水', mnemonic: '水边一族三点小' },
      O: { zone: 44, letter: 'O', keyName: '火', mnemonic: '火变三态广二米' },
      P: { zone: 45, letter: 'P', keyName: '之', mnemonic: '之字宝盖补示衣' },
      A: { zone: 15, letter: 'A', keyName: '工', mnemonic: '工戈草头右框七' },
      S: { zone: 14, letter: 'S', keyName: '木', mnemonic: '木丁西边要无女' },
      D: { zone: 13, letter: 'D', keyName: '大', mnemonic: '大三肆头古石厂' },
      F: { zone: 12, letter: 'F', keyName: '土', mnemonic: '土士二干十寸雨' },
      G: { zone: 11, letter: 'G', keyName: '王', mnemonic: '王旁青头五一提' },
      H: { zone: 21, letter: 'H', keyName: '目', mnemonic: '目止具头卜虎皮' },
      J: { zone: 22, letter: 'J', keyName: '日', mnemonic: '日曰两竖与虫依' },
      K: { zone: 23, letter: 'K', keyName: '口', mnemonic: '口中两川三个竖' },
      L: { zone: 24, letter: 'L', keyName: '田', mnemonic: '田框四车甲单底' },
      Z: { zone: 0, letter: 'Z', keyName: 'Z', mnemonic: '万能键 / 学习键' },
      X: { zone: 55, letter: 'X', keyName: '幺', mnemonic: '幺母绞丝弓三匕' },
      C: { zone: 54, letter: 'C', keyName: '又', mnemonic: '又巴甬矣马失蹄' },
      V: { zone: 53, letter: 'V', keyName: '女', mnemonic: '女刀九巡录无水' },
      B: { zone: 52, letter: 'B', keyName: '子', mnemonic: '子耳了也乃齿底' },
      N: { zone: 51, letter: 'N', keyName: '已', mnemonic: '已类左框心尸羽' },
      M: { zone: 25, letter: 'M', keyName: '山', mnemonic: '山由贝骨下框几' },
    };

    const rows = [
      ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
      ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
      ['Z', 'X', 'C', 'V', 'B', 'N', 'M']
    ];

    // Mathematical proportions for a fluid mechanical layout mapping 10 columns
    const KEY_W = '9.174%';
    const GAP_W = '0.917%';
    const ROW2_OFFSET = '5.045%';
    const ROW3_OFFSET = '15.137%';

    function KeyBlock({ data, isActive, isFirst, offset }) {
      const zoneFirstDigit = Math.floor(data.zone / 10);
      let colorTheme = '';

      // Apply colors based on stroke zones
      switch (zoneFirstDigit) {
        case 1: // 横
          colorTheme = 'border-blue-300 bg-blue-50 dark:bg-blue-900/30 text-blue-900 dark:text-blue-100 dark:border-blue-700';
          break;
        case 2: // 竖
          colorTheme = 'border-emerald-300 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-900 dark:text-emerald-100 dark:border-emerald-700';
          break;
        case 3: // 撇
          colorTheme = 'border-amber-300 bg-amber-50 dark:bg-amber-900/30 text-amber-900 dark:text-amber-100 dark:border-amber-700';
          break;
        case 4: // 点/捺
          colorTheme = 'border-rose-300 bg-rose-50 dark:bg-rose-900/30 text-rose-900 dark:text-rose-100 dark:border-rose-700';
          break;
        case 5: // 折
          colorTheme = 'border-purple-300 bg-purple-50 dark:bg-purple-900/30 text-purple-900 dark:text-purple-100 dark:border-purple-700';
          break;
        default: // Z键
          colorTheme = 'border-gray-300 bg-gray-50 dark:bg-gray-800/50 text-gray-800 dark:text-gray-200 dark:border-gray-600';
          break;
      }

      // Dynamic styles for the fluid 3D press effect using fluid clamp
      const pressStyles = isActive 
        ? `translate-y-[clamp(1px,0.4vw,6px)] border-b-[1px] shadow-inner brightness-105 saturate-150 ring-[clamp(2px,0.3vw,6px)] ring-current ring-opacity-40` 
        : `border-b-[clamp(3px,0.6vw,8px)] hover:-translate-y-[clamp(1px,0.2vw,4px)] hover:shadow-xl`;

      return (
        <div 
          className={`flex flex-col aspect-[3/4] border p-[clamp(2px,0.6vw,12px)] rounded-[clamp(6px,1vw,24px)] relative select-none transition-all duration-100 ${colorTheme} ${pressStyles}`}
          style={{ 
            width: KEY_W,
            marginLeft: isFirst ? offset : '0px'
          }}
        >
          <div className="flex justify-between items-start font-bold leading-none">
            <span className="font-mono opacity-80" style={{ fontSize: 'clamp(8px, 1.5vw, 36px)' }}>{data.letter}</span>
            {data.zone > 0 && (
              <span className="font-mono opacity-70 bg-black/5 dark:bg-white/10 px-[clamp(2px,0.4vw,6px)] py-[clamp(1px,0.2vw,4px)] rounded-[clamp(2px,0.5vw,8px)]" style={{ fontSize: 'clamp(6px, 0.8vw, 18px)' }}>
                {data.zone}
              </span>
            )}
          </div>
          
          <div className="flex-grow flex items-center justify-center -mt-[clamp(2px,0.5vw,8px)]">
            <span className="font-black" style={{ fontSize: 'clamp(14px, 4.2vw, 90px)' }}>{data.keyName}</span>
          </div>
          
          <div className="text-center font-semibold tracking-wide mt-auto opacity-90 leading-tight whitespace-pre-wrap break-words" style={{ fontSize: 'clamp(5px, 0.95vw, 16px)' }}>
            {data.mnemonic}
          </div>
        </div>
      );
    }

    const Legend = () => (
      <div className="flex flex-wrap justify-center gap-3 lg:gap-5 my-6 lg:my-8 px-2">
        <div className="flex items-center gap-2 bg-blue-100/80 dark:bg-blue-900/40 px-3 lg:px-4 py-1.5 lg:py-2 rounded-xl border border-blue-200 dark:border-blue-800 shadow-sm">
          <span className="text-blue-600 dark:text-blue-400 font-black text-lg lg:text-xl">一</span>
          <span className="text-blue-900 dark:text-blue-100 font-semibold text-xs sm:text-sm lg:text-base">1区 横起笔 (G-A)</span>
        </div>
        <div className="flex items-center gap-2 bg-emerald-100/80 dark:bg-emerald-900/40 px-3 lg:px-4 py-1.5 lg:py-2 rounded-xl border border-emerald-200 dark:border-emerald-800 shadow-sm">
          <span className="text-emerald-600 dark:text-emerald-400 font-black text-lg lg:text-xl">丨</span>
          <span className="text-emerald-900 dark:text-emerald-100 font-semibold text-xs sm:text-sm lg:text-base">2区 竖起笔 (H-M)</span>
        </div>
        <div className="flex items-center gap-2 bg-amber-100/80 dark:bg-amber-900/40 px-3 lg:px-4 py-1.5 lg:py-2 rounded-xl border border-amber-200 dark:border-amber-800 shadow-sm">
          <span className="text-amber-600 dark:text-amber-400 font-black text-lg lg:text-xl">丿</span>
          <span className="text-amber-900 dark:text-amber-100 font-semibold text-xs sm:text-sm lg:text-base">3区 撇起笔 (T-Q)</span>
        </div>
        <div className="flex items-center gap-2 bg-rose-100/80 dark:bg-rose-900/40 px-3 lg:px-4 py-1.5 lg:py-2 rounded-xl border border-rose-200 dark:border-rose-800 shadow-sm">
          <span className="text-rose-600 dark:text-rose-400 font-black text-lg lg:text-xl">丶</span>
          <span className="text-rose-900 dark:text-rose-100 font-semibold text-xs sm:text-sm lg:text-base">4区 点起笔 (Y-P)</span>
        </div>
        <div className="flex items-center gap-2 bg-purple-100/80 dark:bg-purple-900/40 px-3 lg:px-4 py-1.5 lg:py-2 rounded-xl border border-purple-200 dark:border-purple-800 shadow-sm">
          <span className="text-purple-600 dark:text-purple-400 font-black text-lg lg:text-xl">乙</span>
          <span className="text-purple-900 dark:text-purple-100 font-semibold text-xs sm:text-sm lg:text-base">5区 折起笔 (N-X)</span>
        </div>
      </div>
    );

    function App() {
      const [pressedKeys, setPressedKeys] = useState(new Set());

      // Handle physical keyboard input
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.ctrlKey || e.metaKey || e.altKey) return;
          
          const key = e.key.toUpperCase();
          if (wubiData[key]) {
            setPressedKeys(prev => {
              const next = new Set(prev);
              next.add(key);
              return next;
            });
          }
        };

        const handleKeyUp = (e) => {
          const key = e.key.toUpperCase();
          if (wubiData[key]) {
            setPressedKeys(prev => {
              const next = new Set(prev);
              next.delete(key);
              return next;
            });
          }
        };

        const handleBlur = () => setPressedKeys(new Set());

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        window.addEventListener('blur', handleBlur);

        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('keyup', handleKeyUp);
          window.removeEventListener('blur', handleBlur);
        };
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 py-6 lg:py-10 px-2 sm:px-4 md:px-8 font-sans selection:bg-blue-200 dark:selection:bg-blue-900">
          <div className="w-full max-w-[1600px] mx-auto">
            <header className="text-center mb-6 lg:mb-8 px-4">
              <h1 className="text-3xl md:text-5xl lg:text-6xl font-extrabold tracking-tight mb-3 lg:mb-4 text-slate-800 dark:text-white">
                新世纪五笔 (06版) <br className="md:hidden" /> 字根键盘布局图
              </h1>
              <p className="text-sm sm:text-base md:text-lg text-slate-600 dark:text-slate-400 max-w-3xl mx-auto font-medium">
                利用色彩与区位分组，大字高亮显示。按下实体键盘按键即可点亮对应字根。
              </p>
            </header>

            <Legend />

            <div className="bg-white dark:bg-slate-900 rounded-[clamp(16px,2vw,36px)] shadow-xl border border-slate-200 dark:border-slate-800 p-[clamp(8px,1.5vw,40px)] overflow-hidden w-full mx-auto">
              {/* Fluid Layout Container without horizontal overflow scrollbars */}
              <div className="flex flex-col w-full items-start" style={{ gap: GAP_W }}>
                
                {/* Row 1 */}
                <div className="flex w-full justify-start" style={{ gap: GAP_W }}>
                  {rows[0].map(letter => (
                    <KeyBlock key={letter} data={wubiData[letter]} isActive={pressedKeys.has(letter)} isFirst={false} />
                  ))}
                </div>
                
                {/* Row 2 - Perfect proportional offset */}
                <div className="flex w-full justify-start" style={{ gap: GAP_W }}>
                  {rows[1].map((letter, idx) => (
                    <KeyBlock key={letter} data={wubiData[letter]} isActive={pressedKeys.has(letter)} isFirst={idx === 0} offset={ROW2_OFFSET} />
                  ))}
                </div>
                
                {/* Row 3 - Perfect proportional offset */}
                <div className="flex w-full justify-start" style={{ gap: GAP_W }}>
                  {rows[2].map((letter, idx) => (
                    <KeyBlock key={letter} data={wubiData[letter]} isActive={pressedKeys.has(letter)} isFirst={idx === 0} offset={ROW3_OFFSET} />
                  ))}
                </div>

              </div>
            </div>

            <footer className="mt-8 lg:mt-12 text-center text-slate-500 dark:text-slate-500 text-xs sm:text-sm font-medium pb-8">
              <p>排布遵循物理键盘 (QWERTY) 布局，数据基于新世纪五笔字型方案。</p>
              <p className="mt-1">提示：横(蓝)、竖(绿)、撇(黄)、点(红)、折(紫) 五个区块构成了五笔输入法最核心的记忆骨架。</p>
            </footer>
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
